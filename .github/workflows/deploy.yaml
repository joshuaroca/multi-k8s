name: Deploy MultiK8s
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: |-
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t joshuaeroca/react-test -f ./client/Dockerfile.dev ./client
          docker run -e CI=true joshuaeroca/react-test npm test

      - name: Set Service Key
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GKE_SA_KEY }}"

      - name: Set Project
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GKE_PROJECT }}

      - name: Auth
        run: |-
          gcloud --quiet auth configure-docker

      - name: Get Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}

      - name: Build
        run: |-
          docker build -t joshuaeroca/multi-client-k8s-gh:latest -t joshuaeroca/multi-client-k8s-gh:${{ github.sha }} -f ./client/Dockerfile ./client
          docker build -t joshuaeroca/multi-server-k8s-gh:latest -t joshuaeroca/multi-server-k8s-gh:${{ github.sha }} -f ./server/Dockerfile ./server
          docker build -t joshuaeroca/multi-worker-k8s-gh:latest -t joshuaeroca/multi-worker-k8s-gh:${{ github.sha }} -f ./worker/Dockerfile ./worker

      - name: Push
        run: |-
          docker push joshuaeroca/multi-client-k8s-gh:latest
          docker push joshuaeroca/multi-server-k8s-gh:latest
          docker push joshuaeroca/multi-worker-k8s-gh:latest

          docker push joshuaeroca/multi-client-k8s-gh:${{ github.sha }}
          docker push joshuaeroca/multi-server-k8s-gh:${{ github.sha }}
          docker push joshuaeroca/multi-worker-k8s-gh:${{ github.sha }}

      - name: Apply
        run: |-
          kubectl apply -f k8s
          kubectl set image deployments/server-deployment server=joshuaeroca/multi-server-k8s-gh:${{ github.sha }}
          kubectl set image deployments/client-deployment client=joshuaeroca/multi-client-k8s-gh:${{ github.sha }}
          kubectl set image deployments/worker-deployment worker=joshuaeroca/multi-worker-k8s-gh:${{ github.sha }}
